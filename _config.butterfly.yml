# Butterfly Theme Configuration

# Banner images
index_img: /img/banner.jpg
default_top_img: /img/banner.jpg
disable_top_img: false

# Visitor count (Busuanzi 不蒜子)
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Cover image settings for archives
cover:
  archives_enable: true

# Navigation
nav:
  display_title: true
  fixed: true

menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder
  video player: /video-player/ || fas fa-play
  # About: /about/ || fas fa-user

# Code blocks
code_blocks:
  theme: darker
  macStyle: false
  copy: true
  language: true

# Social links (update with your own)
social:
  GitHub: https://github.com/brszzz || fab fa-github || '#24292e'

# Avatar (add your own image to source/img/)
avatar:
  img: /img/avatar.jpg
  effect: false

# Advertisement
social_icons:
  Github: fab fa-github

# Post meta display
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Footer
footer:
  owner:
    since: 2026
    powered: false
    copyright: true

# Sidebar
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 'A personal blog'
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/brszzz
  card_announcement:
    enable: true
    content: 'BLACK★ROCK SHOOTER'
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# TOC
toc:
  number: false

# Post display
index_post_content:
  method: 2
  length: 200

# Share
sharejs:
  enable: true
  sites: facebook,twitter,weibo,wechat,qq

# Comments
comments:
  use: Utterances
  lazyload: true

# Utterances
# https://utteranc.es/
utterances:
  repo: brszzz/brszzz.github.io
  issue_term: pathname
  light_theme: github-light
  dark_theme: dark-blue

# Default display mode (dark/light)
display_mode: dark

# Search
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    CDN:

# Word count
wordcount:
  enable: true
  post_wordcount: true
  min2read: true

# Beautify
beautify:
  enable: true
  field: post
  title-prefix-icon: '\f0c1'

# Article license
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/brszzz
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Inject dark mode as default
inject:
  head:
    - <meta http-equiv="Cache-Control" content="no-cache">
    - <style>#footer{background:rgba(77,77,77,.8)!important;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}.framework-info{display:none}.avatar-img img{transform:scale(1.15)}.avatar-img img:hover{transform:scale(1.15) rotate(360deg)}</style>
  bottom:
    - <script>(function(){var t;try{var d=JSON.parse(localStorage.getItem('theme'));if(d&&d.expiry>Date.now())t=d.value}catch(e){}document.documentElement.setAttribute('data-theme',t||'dark')})()</script>
    - <script>document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('a.site-page[href="/video-player/"]').forEach(function(a){a.setAttribute('target','_blank');a.setAttribute('rel','noopener')})})</script>
