# Butterfly Theme Configuration

# Banner images
index_img: /img/banner.jpg
default_top_img: /img/banner.jpg
disable_top_img: false

# Visitor count (Busuanzi 不蒜子)
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Cover image settings for archives
cover:
  archives_enable: true

# Navigation
nav:
  display_title: true
  fixed: true

menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder
  # About: /about/ || fas fa-user

# Code blocks
code_blocks:
  theme: darker
  macStyle: false
  copy: true
  language: true

# Social links (update with your own)
social:
  GitHub: https://github.com/brszzz || fab fa-github || '#24292e'

# Avatar (add your own image to source/img/)
avatar:
  img: /img/avatar.jpg
  effect: false

# Advertisement
social_icons:
  Github: fab fa-github

# Post meta display
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Footer
footer:
  owner:
    since: 2026
    powered: true
    copyright: true

# Sidebar
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 'A personal blog'
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/brszzz
  card_announcement:
    enable: true
    content: 'Welcome to my blog!'
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# Post display
index_post_content:
  method: 2
  length: 200

# Share
sharejs:
  enable: true
  sites: facebook,twitter,weibo,wechat,qq

# Comments
comments:
  use: false

# Search
local_search:
  enable: false

# Word count
wordcount:
  enable: true
  post_wordcount: true
  min2read: true

# Beautify
beautify:
  enable: true
  field: post
  title-prefix-icon: '\f0c1'

# Article license
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/brszzz
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Inject dark mode + password gate + noindex
inject:
  head:
    - <meta name="robots" content="noindex, nofollow">
  bottom:
    - <script>document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('data-theme','dark');</script>
    - |-
      <script>
      (async function() {
        if (sessionStorage.getItem('blog_auth') === '1') return;
        const HASH = 'b1a9b40cc811826c98ca365eb912e6b7293fda20e7d0951bea89dc15815406d8';
        const overlay = document.createElement('div');
        overlay.id = 'pwd-overlay';
        overlay.innerHTML = '<div id="pwd-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:sans-serif"><div style="text-align:center;color:#ccc"><h2 style="color:#fff;margin-bottom:20px">请输入密码</h2><input type="password" id="pwd-input" placeholder="Password" autofocus style="padding:10px 16px;font-size:16px;border:1px solid #555;border-radius:6px;background:#16213e;color:#fff;outline:none"><button id="pwd-btn" style="padding:10px 24px;font-size:16px;margin-left:8px;border:none;border-radius:6px;background:#e94560;color:#fff;cursor:pointer">确认</button><div id="pwd-error" style="color:#f66;margin-top:12px;display:none">密码错误</div></div></div>';
        document.body.appendChild(overlay);
        async function verify(pwd) {
          const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
          const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
          return hashHex === HASH;
        }
        async function check() {
          const pwd = document.getElementById('pwd-input').value;
          if (await verify(pwd)) {
            sessionStorage.setItem('blog_auth', '1');
            overlay.remove();
          } else {
            document.getElementById('pwd-error').style.display = 'block';
          }
        }
        document.getElementById('pwd-btn').addEventListener('click', check);
        document.getElementById('pwd-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') check(); });
      })();
      </script>
